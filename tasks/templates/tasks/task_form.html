{% extends 'tasks/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card p-4">
            <h3 class="fw-bold mb-4">
                <i class="bi bi-pencil-square"></i>
                {% if form.instance.pk %}Edit Task{% else %}Create Task{% endif %}
            </h3>
            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label fw-semibold">Title</label>
                    <input type="text" name="title" value="{{ form.instance.title }}"
                        class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Description</label>
                    <textarea name="description" class="form-control"
                        rows="3">{{ form.instance.description }}</textarea>
                </div>
                <div class="row g-3 mb-3">
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Deadline</label>
                        <input type="datetime-local" name="deadline"
                            class="form-control"
                            value="{{ form.instance.deadline|date:'Y-m-d\TH:i' }}">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Status</label>
                        <select name="status" class="form-select">
                            <option value="Pending" {% if form.instance.status == 'Pending' %}selected{% endif %}>Pending</option>
                            <option value="In Progress" {% if form.instance.status == 'In Progress' %}selected{% endif %}>In Progress</option>
                            <option value="Completed" {% if form.instance.status == 'Completed' %}selected{% endif %}>Completed</option>
                        </select>
                    </div>
                </div>
                <div class="row g-3 mb-4">
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Priority</label>
                        <select name="priority" class="form-select">
                            <option value="">-- Select Priority --</option>
                            {% for priority in priorities %}
                            <option value="{{ priority.id }}"
                                {% if form.instance.priority_id == priority.id %}selected{% endif %}>
                                {{ priority.name }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Category</label>
                        <select name="category" class="form-select">
                            <option value="">-- Select Category --</option>
                            {% for category in categories %}
                            <option value="{{ category.id }}"
                                {% if form.instance.category_id == category.id %}selected{% endif %}>
                                {{ category.name }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-success px-4">
                        <i class="bi bi-save"></i> Save Task
                    </button>
                    <a href="/" class="btn btn-outline-secondary px-4">
                        <i class="bi bi-x-lg"></i> Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
