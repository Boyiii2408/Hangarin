{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>You're Offline - Hangarin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #198754 0%, #0d6efd 100%);
        }
        .offline-card {
            background: white;
            border-radius: 16px;
            padding: 3rem;
            text-align: center;
            max-width: 400px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }
        .offline-icon {
            font-size: 5rem;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <div class="offline-card">
        <div class="offline-icon">📶</div>
        <h2 class="fw-bold mb-3">You're Offline</h2>
        <p class="text-muted mb-4">
            No internet connection found. Please check your connection and try again.
        </p>
        <button onclick="window.location.reload()" class="btn btn-success px-4">
            🔄 Try Again
        </button>
    </div>
</body>
</html>
