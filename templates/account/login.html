{% load socialaccount %}
{% load pwa %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hangarin Login</title>
    {% progressive_web_app_meta %}
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #198754 0%, #0d6efd 100%);
        }
        .auth-card {
            width: 100%;
            max-width: 480px;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            padding: 2.5rem;
        }
        .nav-pills .nav-link {
            color: #198754;
            font-weight: 600;
        }
        .nav-pills .nav-link.active {
            background-color: #198754;
            color: #fff;
        }
        .brand-title {
            color: #198754;
            font-weight: 800;
            font-size: 1.8rem;
        }
        .social-btn {
            border: 1px solid #dee2e6;
            border-radius: 8px;
            padding: 8px 20px;
            font-weight: 500;
            transition: background 0.2s;
        }
        .social-btn:hover {
            background-color: #f8f9fa;
        }
        .divider {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #adb5bd;
            margin: 1rem 0;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #dee2e6;
        }
    </style>
</head>
<body>
<div class="auth-card">

    <!-- Brand -->
    <div class="text-center mb-4">
        <div class="brand-title">
            <i class="bi bi-check2-square"></i> Hangarin
        </div>
        <p class="text-muted small">Your personal task manager</p>
    </div>

    <!-- Tabs -->
    <ul class="nav nav-pills nav-justified mb-4" id="authTabs" role="tablist">
        <li class="nav-item" role="presentation">
            <button class="nav-link active w-100" id="login-tab"
                data-bs-toggle="pill" data-bs-target="#pills-login"
                type="button" role="tab">Login</button>
        </li>
        <li class="nav-item" role="presentation">
            <button class="nav-link w-100" id="register-tab"
                data-bs-toggle="pill" data-bs-target="#pills-register"
                type="button" role="tab">Register</button>
        </li>
    </ul>

    <div class="tab-content" id="authTabContent">

        <!-- LOGIN TAB -->
        <div class="tab-pane fade show active" id="pills-login" role="tabpanel">
            <form method="post" action="{% url 'account_login' %}">
                {% csrf_token %}

                <!-- Google Login -->
                <div class="text-center mb-3">
                    <a href="{% provider_login_url 'google' %}"
                       class="btn social-btn text-dark w-100">
                        <i class="fab fa-google text-danger me-2"></i>
                        Continue with Google
                    </a>
                </div>

                <div class="divider">or</div>

                <!-- Username/Email -->
                <div class="mb-3">
                    <label class="form-label fw-semibold">Email or Username</label>
                    <input type="text" name="login" class="form-control form-control-lg"
                           placeholder="Enter your email or username" required />
                </div>

                <!-- Password -->
                <div class="mb-3">
                    <label class="form-label fw-semibold">Password</label>
                    <input type="password" name="password" class="form-control form-control-lg"
                           placeholder="Enter your password" required />
                </div>

                <!-- Remember + Forgot -->
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="loginCheck" checked />
                        <label class="form-check-label small" for="loginCheck">Remember me</label>
                    </div>
                    <a href="{% url 'account_reset_password' %}" class="small text-success">
                        Forgot password?
                    </a>
                </div>

                <!-- Errors -->
                {% if form.non_field_errors %}
                <div class="alert alert-danger py-2 small">
                    {% for error in form.non_field_errors %}
                    <p{% if forloop.last %} class="mb-0"{% endif %}>{{ error }}</p>
                    {% endfor %}
                </div>
                {% endif %}

                <button type="submit" class="btn btn-success btn-lg w-100">
                    <i class="fas fa-sign-in-alt me-2"></i> Sign In
                </button>
            </form>
        </div>

        <!-- REGISTER TAB -->
        <div class="tab-pane fade" id="pills-register" role="tabpanel">
